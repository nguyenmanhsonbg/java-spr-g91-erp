<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Invoice Issued</title>
</head>
<body>
<p>Dear <span th:text="${recipientName}">Customer</span>,</p>
<p>Your invoice <strong th:text="${invoiceNumber}">INV-0001</strong> has been issued.</p>
<p>
    Contract: <span th:text="${contractNumber}">CT-001</span><br>
    Issue date: <span th:text="${issueDate}">2026-04-03</span><br>
    Due date: <span th:text="${dueDate}">2026-04-30</span><br>
    Total amount: <span th:text="${grandTotal}">0</span>
</p>
<table border="1" cellpadding="6" cellspacing="0">
    <thead>
    <tr>
        <th>Description</th>
        <th>Unit</th>
        <th>Quantity</th>
        <th>Unit price</th>
        <th>Total</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${items}">
        <td th:text="${item.description}">Item</td>
        <td th:text="${item.unit}">PCS</td>
        <td th:text="${item.quantity}">1</td>
        <td th:text="${item.unitPrice}">0</td>
        <td th:text="${item.totalPrice}">0</td>
    </tr>
    </tbody>
</table>
<p th:if="${note != null}">Note: <span th:text="${note}">N/A</span></p>
<p th:if="${documentUrl != null}">
    Document: <a th:href="${documentUrl}" th:text="${documentUrl}">download</a>
</p>
</body>
</html>
