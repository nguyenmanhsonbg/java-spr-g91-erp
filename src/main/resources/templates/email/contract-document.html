<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contract document</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f6f8;font-family:Arial,sans-serif;color:#1f2933;">
<table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background-color:#f4f6f8;padding:24px 12px;">
    <tr>
        <td align="center">
            <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width:620px;background-color:#ffffff;border-radius:16px;overflow:hidden;">
                <tr>
                    <td style="padding:32px;background:linear-gradient(135deg,#1d4ed8,#0f172a);color:#ffffff;">
                        <div style="font-size:12px;letter-spacing:1.4px;text-transform:uppercase;opacity:0.8;" th:text="${companyName}">G90 Steel</div>
                        <h1 style="margin:12px 0 0;font-size:28px;line-height:1.2;">Contract document available</h1>
                    </td>
                </tr>
                <tr>
                    <td style="padding:28px 32px 32px;">
                        <p style="margin:0 0 16px;font-size:16px;line-height:1.6;">
                            <span th:if="${recipientName != null and !#strings.isEmpty(recipientName)}">Hello <strong th:text="${recipientName}">Customer</strong>,</span>
                            <span th:unless="${recipientName != null and !#strings.isEmpty(recipientName)}">Hello,</span>
                        </p>
                        <p style="margin:0 0 20px;font-size:16px;line-height:1.6;">
                            A contract document has been shared for contract <strong th:text="${contractNumber}">CT-0001</strong>.
                        </p>
                        <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="margin:0 0 20px;border-collapse:collapse;">
                            <tr>
                                <td style="padding:10px 0;color:#52606d;width:170px;">Customer</td>
                                <td style="padding:10px 0;font-weight:600;" th:text="${customerName}">Customer A</td>
                            </tr>
                            <tr>
                                <td style="padding:10px 0;color:#52606d;">Document Type</td>
                                <td style="padding:10px 0;font-weight:600;" th:text="${documentType}">Sales contract</td>
                            </tr>
                            <tr th:if="${documentNumber != null and !#strings.isEmpty(documentNumber)}">
                                <td style="padding:10px 0;color:#52606d;">Document Number</td>
                                <td style="padding:10px 0;font-weight:600;" th:text="${documentNumber}">SC-20260322-0001</td>
                            </tr>
                            <tr>
                                <td style="padding:10px 0;color:#52606d;">File Name</td>
                                <td style="padding:10px 0;font-weight:600;" th:text="${fileName}">SC-CT-20260322-0001.pdf</td>
                            </tr>
                        </table>
                        <div th:if="${documentUrl != null and !#strings.isEmpty(documentUrl)}" style="margin:0 0 20px;">
                            <a th:href="${documentUrl}" style="display:inline-block;padding:12px 18px;background-color:#1d4ed8;border-radius:999px;color:#ffffff;text-decoration:none;font-size:14px;">
                                Open document
                            </a>
                        </div>
                        <p style="margin:0;font-size:13px;line-height:1.6;color:#7b8794;">
                            Need help? Contact
                            <a th:href="'mailto:' + ${supportEmail}" th:text="${supportEmail}" style="color:#1d4ed8;text-decoration:none;">support@example.com</a>.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
