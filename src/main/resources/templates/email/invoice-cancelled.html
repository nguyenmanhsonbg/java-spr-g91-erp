<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Invoice Cancelled</title>
</head>
<body>
<p>Dear <span th:text="${recipientName}">Customer</span>,</p>
<p>Your invoice <strong th:text="${invoiceNumber}">INV-0001</strong> has been cancelled.</p>
<p>
    Contract: <span th:text="${contractNumber}">CT-001</span><br>
    Cancellation reason: <span th:text="${cancellationReason}">N/A</span>
</p>
<p th:if="${note != null}">Note: <span th:text="${note}">N/A</span></p>
</body>
</html>
