<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contract approved</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f6f8;font-family:Arial,sans-serif;color:#1f2933;">
<table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background-color:#f4f6f8;padding:24px 12px;">
    <tr>
        <td align="center">
            <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width:620px;background-color:#ffffff;border-radius:16px;overflow:hidden;">
                <tr>
                    <td style="padding:32px;background:linear-gradient(135deg,#0f766e,#0f172a);color:#ffffff;">
                        <div style="font-size:12px;letter-spacing:1.4px;text-transform:uppercase;opacity:0.8;" th:text="${companyName}">G90 Steel</div>
                        <h1 style="margin:12px 0 0;font-size:28px;line-height:1.2;">Contract approved</h1>
                    </td>
                </tr>
                <tr>
                    <td style="padding:28px 32px 32px;">
                        <p style="margin:0 0 16px;font-size:16px;line-height:1.6;">
                            <span th:if="${recipientName != null and !#strings.isEmpty(recipientName)}">Hello <strong th:text="${recipientName}">Stakeholder</strong>,</span>
                            <span th:unless="${recipientName != null and !#strings.isEmpty(recipientName)}">Hello,</span>
                        </p>
                        <p style="margin:0 0 20px;font-size:16px;line-height:1.6;">
                            Contract <strong th:text="${contractNumber}">CT-0001</strong> for
                            <strong th:text="${customerName}">Customer A</strong> has been approved.
                        </p>
                        <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="margin:0 0 20px;border-collapse:collapse;">
                            <tr>
                                <td style="padding:10px 0;color:#52606d;width:170px;">Approved By</td>
                                <td style="padding:10px 0;font-weight:600;" th:text="${approvedByName}">Owner A</td>
                            </tr>
                            <tr>
                                <td style="padding:10px 0;color:#52606d;">Approved At</td>
                                <td style="padding:10px 0;font-weight:600;" th:text="${approvedAt != null ? #temporals.format(approvedAt, 'yyyy-MM-dd HH:mm') : ''}">2026-03-22 14:00</td>
                            </tr>
                            <tr>
                                <td style="padding:10px 0;color:#52606d;">Total Amount</td>
                                <td style="padding:10px 0;font-weight:600;" th:text="${#numbers.formatDecimal(totalAmount, 1, 'COMMA', 2, 'POINT')} + ' VND'">0.00 VND</td>
                            </tr>
                            <tr>
                                <td style="padding:10px 0;color:#52606d;">Payment Terms</td>
                                <td style="padding:10px 0;font-weight:600;" th:text="${paymentTerms}">70% on delivery</td>
                            </tr>
                            <tr>
                                <td style="padding:10px 0;color:#52606d;">Delivery Address</td>
                                <td style="padding:10px 0;font-weight:600;" th:text="${deliveryAddress}">District 9</td>
                            </tr>
                        </table>
                        <p th:if="${note != null and !#strings.isEmpty(note)}" style="margin:0 0 16px;font-size:14px;line-height:1.7;color:#52606d;">
                            Note: <span th:text="${note}">Contract note</span>
                        </p>
                        <p style="margin:0;font-size:13px;line-height:1.6;color:#7b8794;">
                            Need help? Contact
                            <a th:href="'mailto:' + ${supportEmail}" th:text="${supportEmail}" style="color:#0f766e;text-decoration:none;">support@example.com</a>.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
